apiVersion: v1
kind: Service
metadata:
  name: fleetcom-service
  namespace: default
spec:
  selector:
    app: fleetcom            # ← must match deployment label
  type: NodePort
  ports:
    - protocol: TCP
      port: 80                    # Internal cluster port
      targetPort: 3000            # Container port
      nodePort: 30080             # External VPS port (30000–32767)
